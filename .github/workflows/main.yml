name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout project source
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Find Project and Build APK
      run: |
        # Tafuta popote palipo na faili la build.gradle au settings.gradle
        GRADLE_DIR=$(find . -name "build.gradle" -o -name "build.gradle.kts" | head -n 1 | xargs dirname)
        
        if [ -z "$GRADLE_DIR" ]; then
          echo "Error: No Android project found in this repository!"
          exit 1
        fi
        
        echo "Project found in directory: $GRADLE_DIR"
        cd "$GRADLE_DIR"
        
        # Angalia kama kuna gradlew wrapper, isipokuwa tumia gradle ya mfumo
        if [ -f "./gradlew" ]; then
          chmod +x gradlew
          ./gradlew assembleDebug
        else
          gradle assembleDebug || gradle build
        fi

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: "**/build/outputs/apk/debug/*.apk"
